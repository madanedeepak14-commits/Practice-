<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score-item">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="score-item">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse: Move left paddle</p>
            <p>⬆️⬇️ Arrow Keys: Move left paddle</p>
            <p>Computer controls right paddle automatically</p>
            <button id="resetBtn" class="reset-btn">Reset Game</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
